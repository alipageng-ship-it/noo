<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya | Lokal-Pedia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <section class="bg-orange-500 pt-12 pb-20 px-6 rounded-b-[40px] shadow-lg relative">
        <div class="max-w-md mx-auto flex items-center gap-5">
            <div class="relative">
                <img src="https://ui-avatars.com/api/?name=Budi+Santoso&background=white&color=f97316&size=128" class="w-20 h-20 rounded-3xl border-4 border-orange-400 shadow-xl object-cover">
                <div class="absolute -bottom-1 -right-1 bg-green-500 w-6 h-6 rounded-full border-2 border-white flex items-center justify-center">
                    <i class="fas fa-check text-white text-[10px]"></i>
                </div>
            </div>
            <div class="text-white">
                <h2 class="text-xl font-bold italic">Budi Santoso</h2>
                <p class="text-orange-100 text-xs">Warga Sejak: Jan 2024</p>
                <div class="flex items-center gap-2 mt-2">
                    <span class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold">⭐ 4.9 Pembeli</span>
                    <span class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold">🏘️ RT 05</span>
                </div>
            </div>
        </div>
    </section>

    <div class="max-w-md mx-auto -mt-10 px-6">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 grid grid-cols-3 gap-2 text-center">
            <div>
                <p class="text-lg font-extrabold text-gray-800">12</p>
                <p class="text-[10px] text-gray-400 uppercase font-bold">Pesanan</p>
            </div>
            <div class="border-x border-gray-100">
                <p class="text-lg font-extrabold text-gray-800">4</p>
                <p class="text-[10px] text-gray-400 uppercase font-bold">Ulasan</p>
            </div>
            <div>
                <p class="text-lg font-extrabold text-orange-500">250</p>
                <p class="text-[10px] text-gray-400 uppercase font-bold">Poin Lokal</p>
            </div>
        </div>
    </div>

    <main class="max-w-md mx-auto mt-6 px-6 space-y-3">
        
        <h3 class="text-sm font-bold text-gray-400 ml-2 mb-2 uppercase tracking-widest">Akun & Toko</h3>
        
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="flex items-center justify-between p-4 hover:bg-gray-50 border-b border-gray-50 cursor-pointer">
                <div class="flex items-center gap-4 text-gray-700">
                    <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded-xl flex items-center justify-center">
                        <i class="fas fa-user-edit text-sm"></i>
                    </div>
                    <span class="text-sm font-semibold">Ubah Profil</span>
                </div>
                <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
            </div>

            <div class="flex items-center justify-between p-4 hover:bg-gray-50 border-b border-gray-50 cursor-pointer">
                <div class="flex items-center gap-4 text-gray-700">
                    <div class="w-10 h-10 bg-orange-50 text-orange-500 rounded-xl flex items-center justify-center">
                        <i class="fas fa-store text-sm"></i>
                    </div>
                    <span class="text-sm font-semibold italic text-orange-600">Buka Toko UMKM</span>
                </div>
                <span class="bg-orange-500 text-white text-[8px] px-2 py-1 rounded-full font-bold uppercase">Gratis</span>
            </div>

            <div class="flex items-center justify-between p-4 hover:bg-gray-50 border-b border-gray-50 cursor-pointer">
                <div class="flex items-center gap-4 text-gray-700">
                    <div class="w-10 h-10 bg-green-50 text-green-500 rounded-xl flex items-center justify-center">
                        <i class="fas fa-map-pin text-sm"></i>
                    </div>
                    <span class="text-sm font-semibold">Alamat Rumah</span>
                </div>
                <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
            </div>
        </div>

        <h3 class="text-sm font-bold text-gray-400 ml-2 mt-6 mb-2 uppercase tracking-widest">Lainnya</h3>
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="flex items-center justify-between p-4 hover:bg-gray-50 border-b border-gray-50 cursor-pointer">
                <div class="flex items-center gap-4 text-gray-700">
                    <div class="w-10 h-10 bg-gray-50 text-gray-400 rounded-xl flex items-center justify-center">
                        <i class="fas fa-shield-alt text-sm"></i>
                    </div>
                    <span class="text-sm font-semibold">Keamanan & Privasi</span>
                </div>
                <i class="fas fa-chevron-right text-gray-300 text-xs"></i>
            </div>

            <div class="flex items-center justify-between p-4 hover:bg-red-50 cursor-pointer group">
                <div class="flex items-center gap-4 text-red-500">
                    <div class="w-10 h-10 bg-red-50 text-red-500 rounded-xl flex items-center justify-center group-hover:bg-red-500 group-hover:text-white transition-all">
                        <i class="fas fa-sign-out-alt text-sm"></i>
                    </div>
                    <span class="text-sm font-bold">Keluar Akun</span>
                </div>
            </div>
        </div>

        <p class="text-center text-[10px] text-gray-300 mt-8 font-medium italic">Lokal-Pedia v1.0.26 - Bangga Produk Lokal</p>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 shadow-lg z-50">
        <div class="max-w-md mx-auto flex justify-around items-center text-gray-400">
            <div class="text-center"><i class="fas fa-home text-xl"></i><p class="text-[10px]">Beranda</p></div>
            <div class="text-center"><i class="fas fa-receipt text-xl"></i><p class="text-[10px]">Pesanan</p></div>
            <div class="text-center text-orange-500"><i class="fas fa-user text-xl"></i><p class="text-[10px]">Profil</p></div>
        </div>
    </nav>

</body>
</html>
